<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #0A0A0F;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mark {
    font-size: 220px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    display: flex;
    align-items: baseline;
  }
  .mark-ob { color: #FFFFFF; }
  .mark-underscore { color: #4D9EFF; }
</style>
</head>
<body>
  <div class="mark">
    <span class="mark-ob">ob</span><span class="mark-underscore">_</span>
  </div>
</body>
</html>
